<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Weather App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        /* Smooth transition for background colors */
        body {
            transition: background 0.8s ease;
        }

        /* Weather specific backgrounds */
        .bg-clear { background: linear-gradient(to bottom right, #4facfe, #00f2fe); }
        .bg-cloudy { background: linear-gradient(to bottom right, #8e9eab, #eef2f3); }
        .bg-rain { background: linear-gradient(to bottom right, #2b5876, #4e4376); }
        .bg-snow { background: linear-gradient(to bottom right, #e0eafc, #cfdef3); }
        .bg-thunder { background: linear-gradient(to bottom right, #141e30, #243b55); }
    </style>
</head>
<body class="bg-clear min-h-screen flex items-center justify-center p-4 font-sans text-slate-800 antialiased" id="appBody">

    <!-- Main App Container (Glassmorphism Effect) -->
    <main class="bg-white/30 backdrop-blur-xl border border-white/40 shadow-2xl rounded-3xl p-6 sm:p-8 w-full max-w-md transition-all duration-300">
        
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900 tracking-tight flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-yellow-500"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                WeatherNow
            </h1>
            <p class="text-sm text-slate-700 mt-1">Real-time weather updates</p>
        </header>

        <!-- Search Section -->
        <div class="relative mb-6">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name (e.g., London, Tokyo)" 
                class="w-full bg-white/60 border border-white/50 rounded-2xl py-3 pl-4 pr-12 text-slate-800 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:bg-white/80 transition-all shadow-inner"
            >
            <button 
                id="searchBtn" 
                class="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl transition-colors shadow-md"
                aria-label="Search Weather"
            >
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
        </div>

        <!-- Feedback & Status Indicators -->
        <div id="statusMessage" class="hidden text-center text-sm font-medium p-3 rounded-xl mb-4 transition-all"></div>
        
        <!-- Loading Spinner -->
        <div id="loadingIndicator" class="hidden flex-col items-center justify-center py-8">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-2"></div>
            <p class="text-slate-700 text-sm animate-pulse">Fetching forecast...</p>
        </div>

        <!-- Weather Display Data -->
        <div id="weatherData" class="hidden animate-fade-in">
            <!-- Main Temp & Icon -->
            <div class="flex flex-col items-center justify-center mb-8">
                <div id="weatherIconContainer" class="mb-2">
                    <!-- Icon injected here via JS -->
                </div>
                <div class="flex items-start">
                    <span id="temperature" class="text-6xl font-extrabold text-slate-900 tracking-tighter">--</span>
                    <span class="text-2xl font-bold text-slate-700 mt-1">°C</span>
                </div>
                <h2 id="cityNameDisplay" class="text-2xl font-semibold text-slate-800 mt-2">City Name</h2>
                <p id="weatherDescription" class="text-lg text-slate-700 capitalize font-medium">--</p>
            </div>

            <!-- Extra Details Grid -->
            <div class="grid grid-cols-2 gap-4">
                <!-- Humidity -->
                <div class="bg-white/40 rounded-2xl p-4 flex items-center gap-3 border border-white/30 shadow-sm">
                    <div class="p-2 bg-blue-100/50 rounded-full text-blue-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a5 5 0 0 0 5-5c0-2-2.5-7-5-12-2.5 5-5 10-5 12a5 5 0 0 0 5 5Z"/></svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Humidity</p>
                        <p id="humidity" class="text-lg font-bold text-slate-800">--%</p>
                    </div>
                </div>
                
                <!-- Wind Speed -->
                <div class="bg-white/40 rounded-2xl p-4 flex items-center gap-3 border border-white/30 shadow-sm">
                    <div class="p-2 bg-slate-100/50 rounded-full text-slate-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Wind</p>
                        <p id="windSpeed" class="text-lg font-bold text-slate-800">-- km/h</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // DOM Elements
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.getElementById('searchBtn');
        const weatherData = document.getElementById('weatherData');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const statusMessage = document.getElementById('statusMessage');
        const appBody = document.getElementById('appBody');
        
        // Data Elements
        const temperatureEl = document.getElementById('temperature');
        const cityNameDisplayEl = document.getElementById('cityNameDisplay');
        const weatherDescriptionEl = document.getElementById('weatherDescription');
        const humidityEl = document.getElementById('humidity');
        const windSpeedEl = document.getElementById('windSpeed');
        const weatherIconContainer = document.getElementById('weatherIconContainer');

        // Event Listeners
        searchBtn.addEventListener('click', handleSearch);
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSearch();
        });

        // Initialize app with a default city (optional, currently empty to show clean start)
        // fetchWeather('Indore'); 

        async function handleSearch() {
            const city = cityInput.value.trim();
            if (!city) {
                showStatus('Please enter a city name.', 'error');
                return;
            }

            hideData();
            showLoading();

            try {
                // Step 1: Geocoding API - Convert City Name to Lat/Lon
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`;
                const geoResponse = await fetch(geoUrl);
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    throw new Error('City not found. Please check the spelling.');
                }

                const location = geoData.results[0];
                const { latitude, longitude, name, country } = location;

                // Step 2: Weather API - Fetch current weather using Lat/Lon
                const weatherUrl = `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code`;
                const weatherResponse = await fetch(weatherUrl);
                const weatherRawData = await weatherResponse.json();

                if (weatherRawData.error) {
                    throw new Error('Failed to fetch weather data.');
                }

                const current = weatherRawData.current;
                
                // Update UI with fetched data
                updateUI({
                    temp: current.temperature_2m,
                    humidity: current.relative_humidity_2m,
                    wind: current.wind_speed_10m,
                    code: current.weather_code,
                    name: name,
                    country: country
                });

            } catch (error) {
                showStatus(error.message || 'An error occurred while fetching data.', 'error');
            } finally {
                hideLoading();
            }
        }

        function updateUI(data) {
            // Get weather description, icon SVG, and background theme based on WMO code
            const weatherInfo = parseWeatherCode(data.code);

            // Update DOM text content
            temperatureEl.textContent = Math.round(data.temp);
            cityNameDisplayEl.textContent = `${data.name}, ${data.country}`;
            weatherDescriptionEl.textContent = weatherInfo.description;
            humidityEl.textContent = `${data.humidity}%`;
            windSpeedEl.textContent = `${data.wind} km/h`;
            
            // Update Icon
            weatherIconContainer.innerHTML = weatherInfo.icon;

            // Update Background theme
            appBody.className = `min-h-screen flex items-center justify-center p-4 font-sans text-slate-800 antialiased ${weatherInfo.bgClass}`;

            // Reveal Data Container
            weatherData.classList.remove('hidden');
            hideStatus();
        }

        // Helpers for UI state
        function showLoading() {
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');
            statusMessage.classList.add('hidden');
        }

        function hideLoading() {
            loadingIndicator.classList.add('hidden');
            loadingIndicator.classList.remove('flex');
        }

        function hideData() {
            weatherData.classList.add('hidden');
        }

        function showStatus(msg, type) {
            statusMessage.textContent = msg;
            statusMessage.className = `text-center text-sm font-medium p-3 rounded-xl mb-4 transition-all block ${
                type === 'error' ? 'bg-red-100/80 text-red-700 border border-red-200' : 'bg-blue-100/80 text-blue-700'
            }`;
        }

        function hideStatus() {
            statusMessage.classList.add('hidden');
        }

        // WMO Weather interpretation codes mapping
        // https://open-meteo.com/en/docs
        function parseWeatherCode(code) {
            let info = { description: 'Unknown', icon: '', bgClass: 'bg-clear' };

            // SVGs for different conditions (using Lucide icons style)
            const sunIcon = `<svg class="text-yellow-500 w-24 h-24 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
            const cloudIcon = `<svg class="text-slate-400 w-24 h-24 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>`;
            const rainIcon = `<svg class="text-blue-500 w-24 h-24 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M16 14v6"/><path d="M8 14v6"/><path d="M12 16v6"/></svg>`;
            const snowIcon = `<svg class="text-sky-300 w-24 h-24 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 15 4-4 4 4"/><path d="m16 9-4 4-4-4"/><path d="M12 2v20"/></svg>`;
            const thunderIcon = `<svg class="text-purple-600 w-24 h-24 drop-shadow-md" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><path d="M6 16.326A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 .5 8.973"/><path d="m13 12-3 5h4l-3 5"/></svg>`;

            if (code === 0) {
                info = { description: 'Clear sky', icon: sunIcon, bgClass: 'bg-clear' };
            } else if (code >= 1 && code <= 3) {
                info = { description: 'Partly cloudy', icon: cloudIcon, bgClass: 'bg-cloudy' };
            } else if (code === 45 || code === 48) {
                info = { description: 'Foggy', icon: cloudIcon, bgClass: 'bg-cloudy' };
            } else if (code >= 51 && code <= 67) {
                info = { description: 'Rain', icon: rainIcon, bgClass: 'bg-rain' };
            } else if (code >= 71 && code <= 77) {
                info = { description: 'Snow', icon: snowIcon, bgClass: 'bg-snow' };
            } else if (code >= 80 && code <= 82) {
                info = { description: 'Rain showers', icon: rainIcon, bgClass: 'bg-rain' };
            } else if (code >= 85 && code <= 86) {
                info = { description: 'Snow showers', icon: snowIcon, bgClass: 'bg-snow' };
            } else if (code >= 95 && code <= 99) {
                info = { description: 'Thunderstorm', icon: thunderIcon, bgClass: 'bg-thunder' };
            }

            return info;
        }
    </script>
</body>
</html>
